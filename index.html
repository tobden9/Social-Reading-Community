<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Social Reading Community</title>
    <style>
        :root {
            --civic-blue-dark: #1a365d;
            --civic-blue-light: #3b66bc;
            --warm-bg: #f4f1ea;
            --card-bg: #ffffff;
            --text-main: #333333;
            --accent-orange: #e25822;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--warm-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border-top: 6px solid var(--civic-blue-dark);
            position: relative;
        }

        .logo-placeholder {
            width: 60px;
            height: 60px;
            background-color: var(--accent-orange);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        h1 {
            font-size: 22px;
            color: var(--civic-blue-dark);
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* --- Step 1: Role Selection Styles --- */
        .role-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .role-btn {
            background-color: #f9f9f9;
            border: 2px solid #e0e0e0;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .role-btn:hover {
            border-color: var(--civic-blue-light);
            background-color: #f0f4f8;
        }

        .role-icon {
            font-size: 24px;
            background-color: var(--civic-blue-light);
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        .role-text strong {
            display: block;
            font-size: 16px;
            color: var(--civic-blue-dark);
        }

        .role-text span {
            font-size: 13px;
            color: #666;
        }

        /* --- Step 2: Login Form Styles --- */
        #login-section {
            display: none; /* Hidden by default */
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--civic-blue-light);
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .form-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--civic-blue-dark);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-primary {
            background-color: var(--civic-blue-light);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--civic-blue-dark);
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #777;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }

        .alternative-login {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-secondary {
            background-color: #f9f9f9;
            color: var(--text-main);
            border: 1px solid #ccc;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background-color: #efefef;
        }

        .footer-links {
            margin-top: 20px;
            font-size: 13px;
        }

        .footer-links a {
            color: var(--civic-blue-light);
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <div class="logo-placeholder">CITY</div>
    <h1>Social Reading Community</h1>
    <div class="tagline">Read Together, Grow Together</div>

    <div id="role-selection">
        <p style="margin-bottom: 20px; font-size: 15px; color: #555;">Please select how you want to log in today:</p>
        
        <div class="role-options">
            <button class="role-btn" onclick="showLogin('reader')" aria-label="Log in as a Reader">
                <div class="role-icon">📖</div>
                <div class="role-text">
                    <strong>I am a Reader</strong>
                    <span>Join clubs, track reading, and review books.</span>
                </div>
            </button>

            <button class="role-btn" onclick="showLogin('staff')" aria-label="Log in as Library Staff">
                <div class="role-icon">🏢</div>
                <div class="role-text">
                    <strong>I am Library Staff</strong>
                    <span>Manage clubs, view analytics, and run challenges.</span>
                </div>
            </button>
        </div>
    </div>

    <div id="login-section">
        <button class="back-btn" onclick="goBack()" aria-label="Go back to role selection">← Back</button>
        
        <h2 id="dynamic-form-title" class="form-title">Reader Login</h2>

        <form id="auth-form" action="#" method="POST">
            <div class="input-group">
                <label for="email">Email Address or Username</label>
                <input type="text" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div id="reader-alternatives">
            <div class="divider">OR</div>
            <div class="alternative-login">
                <button class="btn-secondary">Get a One-Time Login Link via SMS</button>
                <button class="btn-secondary">Scan a Poster QR Code to Join</button>
            </div>
            <div class="footer-links">
                <p>Don't have an account? <a href="#">Join the community</a></p>
                <p><a href="#">Forgot your password?</a></p>
            </div>
        </div>
        
        <div id="staff-alternatives" class="footer-links" style="display: none;">
            <p><a href="#">Forgot your staff portal password?</a></p>
            <p style="color: #888; margin-top: 15px;">Staff access requires IT authorization.</p>
        </div>

    </div>
</div>

<script>
    // JavaScript to handle the flow between role selection and login
    function showLogin(role) {
        // Hide role selection, show login form
        document.getElementById('role-selection').style.display = 'none';
        document.getElementById('login-section').style.display = 'block';

        const formTitle = document.getElementById('dynamic-form-title');
        const authForm = document.getElementById('auth-form');
        const readerAlts = document.getElementById('reader-alternatives');
        const staffAlts = document.getElementById('staff-alternatives');

        if (role === 'reader') {
            formTitle.innerText = 'Reader Login';
            readerAlts.style.display = 'block'; // Show QR/SMS options
            staffAlts.style.display = 'none';
            // Send to reader dashboard
            authForm.setAttribute('onsubmit', "event.preventDefault(); window.location.href='dashboard.html';");
        } else if (role === 'staff') {
            formTitle.innerText = 'Library Staff Portal';
            readerAlts.style.display = 'none'; // Hide QR/SMS options
            staffAlts.style.display = 'block'; // Show staff footer
            // Send to admin dashboard
            authForm.setAttribute('onsubmit', "event.preventDefault(); window.location.href='dashboard.html';");
        }
    }

    function goBack() {
        // Hide login form, show role selection
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('role-selection').style.display = 'block';
        
        // Clear the form fields when going back
        document.getElementById('auth-form').reset();
    }
</script>

</body>
</html>
