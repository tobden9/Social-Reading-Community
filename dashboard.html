<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Dashboard - Social Reading Community</title>

<style>
:root {
    --civic-blue-dark: #1a365d;
    --civic-blue-light: #3b66bc;
    --warm-bg: #f4f1ea;
    --card-bg: #ffffff;
    --text-main: #333333;
    --text-muted: #666666;
    --accent-orange: #e25822;
}

/* Accessibility: Font Scaling */
:root { --base-font-size: 16px; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--warm-bg); color: var(--text-main); margin:0; font-size: var(--base-font-size); }
.font-small { --base-font-size: 14px; }
.font-medium { --base-font-size: 16px; }
.font-large { --base-font-size: 18px; }

/* Layout */
header { background: var(--civic-blue-dark); color:white; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.logo-area { display:flex; align-items:center; gap:15px; font-weight:bold; }
.logo-circle { background: var(--accent-orange); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; }
nav a { color:white; text-decoration:none; margin-left:20px; }

.dashboard-container { max-width:1200px; margin:30px auto; padding:0 20px; display:grid; grid-template-columns:2fr 1fr; gap:20px; }
.card { background:var(--card-bg); padding:25px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.05); border-top:4px solid var(--civic-blue-light); }

/* Accessibility Controls */
.accessibility-controls {
    position: fixed;
    bottom: 80px;
    right: 20px;
    display: flex;
    gap: 5px;
    z-index: 1000;
}
.accessibility-controls button {
    padding: 8px 10px;
    border-radius: 5px;
    border: none;
    background: var(--civic-blue-dark);
    color: white;
    cursor: pointer;
}

/* High Contrast Mode */
body.high-contrast {
    --warm-bg: #000;
    --card-bg: #000;
    --text-main: #fff;
    --text-muted: #ffff00;
    --civic-blue-dark: #00ff00;
    --civic-blue-light: #00ffff;
}
.contrast-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    background: var(--civic-blue-dark);
    color: white;
    border-radius: 50px;
    cursor: pointer;
    border: 2px solid white;
    z-index: 1000;
}

/* Recommendation Cards */
.book-card {
    background: var(--card-bg);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
}
</style>
</head>

<body>

<header>
  <div class="logo-area">
    <div class="logo-circle">CITY</div>
    <span>Social Reading Community</span>
  </div>
  <nav aria-label="Main Navigation">
    <a href="dashboard.html">Dashboard</a>
    <a href="BookClubFlow.html">Book Clubs</a>
    <a href="BookCategorization.html">Discover</a>
    <a href="index.html" onclick="localStorage.clear()">Logout</a>
  </nav>
</header>

<!-- Accessibility Controls -->
<div class="accessibility-controls">
  <button onclick="setFontSize('small')" aria-label="Decrease font size">A-</button>
  <button onclick="setFontSize('medium')" aria-label="Default font size">A</button>
  <button onclick="setFontSize('large')" aria-label="Increase font size">A+</button>
</div>

<button class="contrast-toggle" onclick="toggleContrast()" aria-label="Toggle high contrast mode">🌓 Contrast</button>

<div class="dashboard-container">
    <main>
        <h1 id="welcomeHeader">Welcome back!</h1>

        <section class="card">
            <h2>Recommended for You</h2>
            <div id="recommendations" aria-live="polite"></div>
        </section>
    </main>

    <aside>
        <section class="card">
            <h2>Reading Goal</h2>
            <p id="goalText">Set during onboarding</p>
        </section>
    </aside>
</div>

<script>
/* Accessibility Functions */
function toggleContrast() {
    document.body.classList.toggle('high-contrast');
    localStorage.setItem('highContrast', document.body.classList.contains('high-contrast'));
}
function setFontSize(size) {
    document.body.classList.remove('font-small','font-medium','font-large');
    document.body.classList.add(`font-${size}`);
    localStorage.setItem('fontSize', size);
}

/* Restore Preferences */
window.onload = function() {
    if (localStorage.getItem('highContrast') === 'true') document.body.classList.add('high-contrast');
    const fontSize = localStorage.getItem('fontSize') || 'medium';
    setFontSize(fontSize);

    const name = localStorage.getItem('userName') || 'Reader';
    const goal = localStorage.getItem('readingGoal') || '10';
    document.getElementById('welcomeHeader').textContent = `Welcome back, ${name}!`;
    document.getElementById('goalText').textContent = `Your goal: ${goal} books this year`;

    renderRecommendations();
};

/* PB7: Recommendation Engine */
const bookData = [
    { title: "Dune", author: "Frank Herbert", genre: "Sci-Fi" },
    { title: "Sapiens", author: "Yuval Noah Harari", genre: "History" },
    { title: "The Hobbit", author: "J.R.R. Tolkien", genre: "Fantasy" },
    { title: "Gone Girl", author: "Gillian Flynn", genre: "Mystery" }
];

function renderRecommendations() {
    const preferences = JSON.parse(localStorage.getItem('userGenres')) || [];
    const container = document.getElementById('recommendations');

    const recommendations = bookData.filter(book => preferences.includes(book.genre));

    if (recommendations.length === 0) {
        container.innerHTML = "<p>No recommendations yet. Update your interests!</p>";
        return;
    }

    container.innerHTML = recommendations.map(book => `
        <div class="book-card">
            <strong>${book.title}</strong><br>
            <span>${book.author}</span>
        </div>
    `).join('');
}
</script>

</body>
</html>
